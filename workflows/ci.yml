name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    name: Backend — pytest (83 tests)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: spad
          POSTGRES_PASSWORD: spad_dev_password
          POSTGRES_DB: spad_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Apply migrations
        working-directory: backend
        env:
          DATABASE_URL: postgresql+psycopg://spad:spad_dev_password@localhost:5432/spad_dev
          APP_ENV: test
          FIREBASE_ENABLED: "false"
        run: alembic upgrade head

      - name: Seed test database
        working-directory: backend
        env:
          DATABASE_URL: postgresql+psycopg://spad:spad_dev_password@localhost:5432/spad_dev
          APP_ENV: test
          FIREBASE_ENABLED: "false"
        run: python -m app.seed.run

      - name: Run tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql+psycopg://spad:spad_dev_password@localhost:5432/spad_dev
          APP_ENV: test
          FIREBASE_ENABLED: "false"
        run: python -m pytest tests/ -v --tb=short

  frontend-typecheck:
    name: Frontend — TypeScript build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: TypeScript check + production build
        working-directory: frontend
        env:
          VITE_FIREBASE_ENABLED: "false"
          VITE_API_BASE_URL: ""
        run: npm run build
